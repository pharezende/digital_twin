services:
  app:
    build: .
    ports:
      - "7860:7860"
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - ./persistence/chroma_db_docker:/app/persistence
      - ./documents:/app/documents
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana-data: