services:
  app:
    build: .
    ports:
      - "7860:7860"
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - ./container_data:/app/persistence
      - ./documents:/app/documents
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app